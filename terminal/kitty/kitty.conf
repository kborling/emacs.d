# Kitty Terminal Configuration
# Cross-platform: Linux, macOS

# Font
font_family      JetBrains Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0
modify_font cell_height 105%
disable_ligatures always
undercurl_style thin-sparse
text_fg_override_threshold 4.5 ratio

# Performance
repaint_delay    5
input_delay      1
sync_to_monitor  yes

# Cursor
cursor_shape beam
cursor_beam_thickness 2.0
cursor_trail 3
cursor_trail_decay 0.1 0.3

# Scrollback
scrollback_lines 10000
scrollback_pager_history_size 4
scrollback_fill_enlarged_window yes
scrollbar never
pixel_scroll yes

# Mouse
mouse_hide_wait 3.0
url_style curly
open_url_with default
copy_on_select clipboard
paste_actions quote-urls-at-prompt,confirm

# Bell
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes

# Window
remember_window_size  yes
initial_window_width  120c
initial_window_height 40c
window_padding_width  4
placement_strategy    center
confirm_os_window_close 0

# Window splits
enabled_layouts splits,tall,stack
active_border_color #fcaa05
inactive_border_color #222425
bell_border_color #ff0000
window_border_width 1pt

# Tab Bar
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{index}: {fmt.bold}{title}{fmt.nobold}"
tab_activity_symbol " *"
active_tab_font_style   bold
inactive_tab_font_style normal

# Theme
include themes/fleury.conf

# Shell integration
shell_integration enabled

# Remote control (socket only for security)
allow_remote_control socket-only
listen_on unix:/tmp/kitty

# Clipboard
clipboard_control write-clipboard write-primary read-clipboard read-primary

# Display
linux_display_server auto
term xterm-256color
update_check_interval 0

# Copy / Paste
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard

# Tabs
map ctrl+shift+t        new_tab_with_cwd
map ctrl+shift+w        close_tab
map ctrl+shift+right    next_tab
map ctrl+shift+left     previous_tab
map ctrl+shift+.        move_tab_forward
map ctrl+shift+,        move_tab_backward
map ctrl+shift+alt+t    set_tab_title
map ctrl+shift+1        goto_tab 1
map ctrl+shift+2        goto_tab 2
map ctrl+shift+3        goto_tab 3
map ctrl+shift+4        goto_tab 4
map ctrl+shift+5        goto_tab 5

# Window splits
map ctrl+shift+enter    launch --cwd=current
map ctrl+shift+\        launch --location=vsplit --cwd=current
map ctrl+shift+-        launch --location=hsplit --cwd=current
map ctrl+shift+]        next_window
map ctrl+shift+[        previous_window
map ctrl+shift+n        new_os_window_with_cwd
map ctrl+shift+z        toggle_layout stack
map ctrl+shift+r        start_resizing_window

# Focus (vim-style)
map ctrl+shift+h        neighboring_window left
map ctrl+shift+l        neighboring_window right
map ctrl+shift+k        neighboring_window up
map ctrl+shift+j        neighboring_window down

# Font size
map ctrl+shift+equal    change_font_size all +1.0
map ctrl+shift+minus    change_font_size all -1.0
map ctrl+shift+0        change_font_size all 0

# Scrolling
map ctrl+shift+up       scroll_line_up
map ctrl+shift+down     scroll_line_down
map ctrl+shift+page_up  scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home     scroll_home
map ctrl+shift+end      scroll_end

# Misc
map ctrl+shift+f5       load_config_file
map ctrl+shift+f        launch --type=overlay --stdin-source=@screen_scrollback fzf --no-sort --no-mouse --exact -i

# macOS
map cmd+c               copy_to_clipboard
map cmd+v               paste_from_clipboard
map cmd+t               new_tab_with_cwd
map cmd+w               close_tab
map cmd+n               new_os_window_with_cwd
map cmd+d               launch --location=vsplit --cwd=current
map cmd+shift+d         launch --location=hsplit --cwd=current
map cmd+equal           change_font_size all +1.0
map cmd+minus           change_font_size all -1.0
map cmd+0               change_font_size all 0
map cmd+1               goto_tab 1
map cmd+2               goto_tab 2
map cmd+3               goto_tab 3
map cmd+4               goto_tab 4
map cmd+5               goto_tab 5
macos_option_as_alt     yes
macos_titlebar_color    background
